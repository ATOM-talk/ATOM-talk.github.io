<!DOCTYPE HTML>
<html>
<head>
    <title>Elements - Hyperspace by HTML5 UP</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <link rel="stylesheet" href="assets/css/main.css" />
    <noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>
    <style>
        /* --- 基础重置与变量 (统一风格) --- */
        :root {
            --bg-color: #1e1b2e;
            --card-bg: #251f33;
            --border-color: rgba(255, 255, 255, 0.05);
            --accent-color: #9d72ff;
            --text-main: #ffffff;
            --text-muted: #a0a0b0;
            --gradient-line: linear-gradient(90deg, #5e4b9e 0%, #ff7eb3 100%);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

	<body class="is-preload">

		<!-- Header -->
			<header id="header">
				<a href="index.html" class="title">Hyperspace</a>
				<nav>
					<ul>
						<li><a href="index.html">Home</a></li>
						<li><a href="generic.html" class="active">Generic</a></li>
						<li><a href="elements.html">Elements</a></li>
					</ul>
				</nav>
			</header>

			/* 页面标题区 */
			.page-header {
				margin-bottom: 40px;
				display: flex;
				align-items: baseline;
				gap: 20px;
				flex-wrap: wrap;
        }

        .page-title {
            font-size: 32px;
            font-weight: 700;
            display: flex;
            align-items: center;
            margin: 0;
        }


        .page-desc {
            color: var(--text-muted);
            font-size: 16px;
        }

        /* --- 渐变分割线 (采用 6.html 风格) --- */
        .divider-line {
            height: 2px;
            background: var(--gradient-line);
            width: 100%;
            margin: 20px 0 40px 0;
            opacity: 0.8;
        }

        /* --- 播放器区域 --- */
        .player-wrapper {
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 1px solid var(--border-color);
            margin-bottom: 40px;
            position: relative;
        }

        .video-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            background-image: url('https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
        }

        .subtitles-overlay {
            position: absolute;
            bottom: 20%;
            left: 0;
            width: 100%;
            text-align: center;
            pointer-events: none;
        }

        .sub-en {
            font-size: 1.5rem;
            font-weight: 600;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            display: block;
            margin-bottom: 5px;
        }

        .sub-cn {
            font-size: 1.2rem;
            color: #ddd;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            display: block;
        }

        .controls-bar {
            background: rgba(20, 20, 20, 0.9);
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            backdrop-filter: blur(10px);
        }

        .play-info {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 0.9rem;
            color: #fff;
        }

        .play-btn-icon {
            width: 0;
            height: 0;
            border-top: 6px solid transparent;
            border-bottom: 6px solid transparent;
            border-left: 10px solid #fff;
            cursor: pointer;
        }

        .progress-bar {
            flex-grow: 1;
            height: 4px;
            background: #444;
            margin: 0 20px;
            border-radius: 2px;
            position: relative;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: var(--accent-color);
            border-radius: 2px;
        }

        /* --- 剧集列表 --- */
        .episodes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
        }

        .episode-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 20px;
            border-radius: 12px;
            transition: all 0.3s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 120px;
        }

        .episode-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-color: rgba(94, 75, 158, 0.5);
        }

        .episode-card.active {
            border-color: var(--accent-color);
            background: rgba(157, 114, 255, 0.1);
            box-shadow: 0 0 15px rgba(157, 114, 255, 0.1);
        }

        .ep-number {
            font-size: 1.2rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 5px;
        }

        .ep-status {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 15px;
        }

        .ep-action {
            font-size: 0.8rem;
            color: var(--accent-color);
            text-transform: uppercase;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* --- 响应式调整 --- */
        @media (max-width: 768px) {
            .page-header {
                flex-direction: column;
                gap: 10px;
            }
            .page-title { font-size: 28px; }
            .episodes-grid { grid-template-columns: repeat(2, 1fr); }
            .sub-en { font-size: 1.1rem; }
            .sub-cn { font-size: 0.9rem; }
        }
    </style>
</head>
